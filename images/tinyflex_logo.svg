<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D Cube Container Base -->
    <g filter="url(#shadow)">
        <!-- Cube Front -->
        <path d="M20 20 L40 10 L60 20 L40 30 Z" fill="url(#gradient1)"/>
        <!-- Cube Top -->
        <path d="M40 10 L60 20 L60 40 L40 30 Z" fill="url(#gradient2)"/>
        <!-- Cube Side -->
        <path d="M20 20 L40 30 L40 50 L20 40 Z" fill="url(#gradient3)"/>
        
        <!-- Expansion Arrow -->
        <path d="M65 25 L75 25 L75 20 L85 30 L75 40 L75 35 L65 35 Z" fill="#4A6FA5"/>
        
        <!-- Flex Lines -->
        <path d="M25 45 L35 45" stroke="#2C5282" stroke-width="2" stroke-linecap="round"/>
        <path d="M30 48 L40 48" stroke="#2C5282" stroke-width="2" stroke-linecap="round"/>
        <path d="M35 51 L45 51" stroke="#2C5282" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <!-- Logo Text -->
    <g font-family="Arial, sans-serif" font-weight="bold">
        <!-- Tiny Text with 3D Effect -->
        <text x="90" y="28" font-size="24" fill="url(#textGradient)">
            <tspan>Tiny</tspan>
            <tspan x="90" y="52" font-size="24">Flex</tspan>
        </text>
        
        <!-- Tagline -->
        <text x="90" y="70" font-size="10" fill="#666" font-weight="normal">
            Expandable Homes
        </text>
    </g>
    
    <!-- Gradients -->
    <defs>
        <!-- Cube Gradient 1 (Front) -->
        <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4A6FA5"/>
            <stop offset="100%" stop-color="#2C5282"/>
        </linearGradient>
        
        <!-- Cube Gradient 2 (Top) -->
        <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5A86C9"/>
            <stop offset="100%" stop-color="#3A6CB0"/>
        </linearGradient>
        
        <!-- Cube Gradient 3 (Side) -->
        <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3A6CB0"/>
            <stop offset="100%" stop-color="#2C5282"/>
        </linearGradient>
        
        <!-- Text Gradient -->
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2C5282"/>
            <stop offset="50%" stop-color="#4A6FA5"/>
            <stop offset="100%" stop-color="#2C5282"/>
        </linearGradient>
        
        <!-- Shadow Filter -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#2C5282" flood-opacity="0.3"/>
            <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="white" flood-opacity="0.2"/>
        </filter>
        
        <!-- Glow Effect -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
</svg>
